<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Route Planner</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#2d3133",
                        "surface-container": "#eceef0",
                        "on-secondary-fixed": "#111c2d",
                        "on-error-container": "#93000a",
                        "surface-bright": "#f7f9fb",
                        "tertiary-container": "#8d6100",
                        "tertiary-fixed": "#ffdeac",
                        "on-tertiary": "#ffffff",
                        "on-background": "#191c1e",
                        "surface-tint": "#006a63",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#eff1f3",
                        "on-surface": "#191c1e",
                        "tertiary-fixed-dim": "#ffba38",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#bcc7de",
                        "secondary-fixed": "#d8e3fb",
                        "secondary": "#545f73",
                        "outline": "#6e7977",
                        "surface-variant": "#e0e3e5",
                        "on-primary-container": "#a3faef",
                        "primary-container": "#0f766e",
                        "on-primary-fixed-variant": "#00504a",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#281900",
                        "secondary-container": "#d5e0f8",
                        "surface-container-highest": "#e0e3e5",
                        "on-primary-fixed": "#00201d",
                        "on-secondary-container": "#586377",
                        "on-tertiary-container": "#ffe7c6",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#80d5cb",
                        "outline-variant": "#bdc9c6",
                        "surface-container-high": "#e6e8ea",
                        "surface-dim": "#d8dadc",
                        "on-secondary": "#ffffff",
                        "tertiary": "#6d4b00",
                        "inverse-primary": "#80d5cb",
                        "background": "#f7f9fb",
                        "on-tertiary-fixed-variant": "#604100",
                        "surface-container-low": "#f2f4f6",
                        "surface": "#f7f9fb",
                        "on-surface-variant": "#3e4947",
                        "primary-fixed": "#9cf2e8",
                        "on-secondary-fixed-variant": "#3c475a",
                        "primary": "#005c55",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "margin-mobile": "16px",
                        "stack-sm": "4px",
                        "stack-md": "12px",
                        "stack-lg": "24px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "headline-md": ["Plus Jakarta Sans"],
                        "caption": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "headline-sm": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "title-lg": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "caption": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "700" }],
                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "title-lg": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>.map-bg {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuAcBJZO09GZLJdIGXUDaq0L5P75XmDCzr7x1RbGQcDbPY_OQ6yifuZANgXnIgHqbNI17YILi0sq2_XNmV89zRbQdIB9_Go6z5suuXuyhgt5OBEQA3KFX1IlYhe_ALbPZpiFNeKJQ019WrpKxnRAqkAlKGk5EgsD0fyS2Ca1pL617JwUxA24dZjshPkqwiARqPNYLkmsQ3GiKDnteTHuqh_XeiBt3jaYa4bW2HB6zAoZHDwo32VXZ-fUyCIBKu0q4ZraTI3_XCSTBLzT);
    background-size: cover;
    background-position: center
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col relative overflow-hidden">
<!-- Top App Bar (Task-focused, so no global shell, but a back header) -->
<header class="bg-surface border-b border-outline-variant flex justify-between items-center w-full px-margin-mobile h-16 shrink-0 z-10 sticky top-0">
<button aria-label="Go back" class="text-on-surface hover:bg-surface-container rounded-full p-2 transition-transform active:scale-95 duration-100">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-headline-sm font-headline-sm font-bold text-on-surface">Route Planner</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Map Area (Underneath cards) -->
<div class="absolute inset-0 top-16 bottom-0 z-0 map-bg" data-alt="A top-down view of a modern, clean digital map interface showing a route from Mumbai to Pune. The map style is light and minimal, with soft grey roads and a subtle teal accent indicating the planned route. The lighting is bright and even, fitting a high-utility corporate application style.">
<!-- Mock Map Pins -->
<div class="absolute top-1/3 left-1/4 transform -translate-x-1/2 -translate-y-1/2">
<div class="bg-primary text-on-primary rounded-full w-10 h-10 flex items-center justify-center shadow-md border-2 border-surface">
<span class="text-label-md font-label-md">1</span>
</div>
<div class="w-1 h-8 bg-primary mx-auto -mt-1"></div>
</div>
<div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
<div class="bg-primary text-on-primary rounded-full w-10 h-10 flex items-center justify-center shadow-md border-2 border-surface">
<span class="text-label-md font-label-md">2</span>
</div>
<div class="w-1 h-8 bg-primary mx-auto -mt-1"></div>
</div>
<div class="absolute bottom-1/4 right-1/4 transform -translate-x-1/2 -translate-y-1/2">
<div class="bg-primary text-on-primary rounded-full w-10 h-10 flex items-center justify-center shadow-md border-2 border-surface">
<span class="text-label-md font-label-md">3</span>
</div>
<div class="w-1 h-8 bg-primary mx-auto -mt-1"></div>
</div>
<!-- Mock Polyline via SVG -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" preserveaspectratio="none">
<path class="opacity-80" d="M 25% 33% Q 40% 40% 50% 50% T 75% 75%" fill="none" stroke="#005c55" stroke-dasharray="8 4" stroke-width="4"></path>
</svg>
</div>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col justify-between z-10 pointer-events-none">
<!-- Top Card: Route Input -->
<div class="px-margin-mobile pt-stack-md pointer-events-auto">
<div class="bg-surface-container-lowest rounded-xl shadow-[0_2px_8px_rgba(30,41,59,0.08)] p-4 flex flex-col gap-stack-md">
<div class="flex items-start gap-4">
<!-- Route Timeline Visual -->
<div class="flex flex-col items-center mt-2">
<div class="w-3 h-3 rounded-full border-2 border-primary bg-surface-container-lowest"></div>
<div class="w-px h-8 border-l-2 border-dashed border-outline-variant my-1"></div>
<div class="w-3 h-3 rounded-full bg-primary"></div>
</div>
<!-- Input Fields -->
<div class="flex-1 flex flex-col gap-stack-sm">
<div class="border border-outline-variant rounded-lg px-3 py-2 bg-surface focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all">
<input class="bg-transparent border-none p-0 text-body-md font-body-md text-on-surface w-full focus:ring-0" placeholder="From" type="text" value="Bandra, Mumbai"/>
</div>
<div class="border border-outline-variant rounded-lg px-3 py-2 bg-surface focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all">
<input class="bg-transparent border-none p-0 text-body-md font-body-md text-on-surface w-full focus:ring-0" placeholder="To" type="text" value="Pune, Maharashtra"/>
</div>
</div>
<button class="mt-8 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">swap_vert</span>
</button>
</div>
<!-- Vehicle Info Chips -->
<div class="flex flex-wrap gap-2 pt-2 border-t border-outline-variant/50">
<span class="inline-flex items-center gap-1 bg-surface-container rounded-full px-3 py-1 text-caption font-caption text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]">directions_car</span>
                        Tata Nexon EV
                    </span>
<span class="inline-flex items-center gap-1 bg-surface-container rounded-full px-3 py-1 text-caption font-caption text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]">ev_station</span>
                        CCS2
                    </span>
<span class="inline-flex items-center gap-1 bg-surface-container rounded-full px-3 py-1 text-caption font-caption text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]">battery_full</span>
                        300km Range
                    </span>
</div>
</div>
</div>
<!-- Bottom Panel: Suggested Stops -->
<div class="bg-surface-container-lowest rounded-t-xl shadow-[0_-4px_16px_rgba(30,41,59,0.08)] pointer-events-auto mt-auto">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-3 pb-1 cursor-ns-resize">
<div class="w-12 h-1.5 bg-outline-variant rounded-full"></div>
</div>
<div class="px-margin-mobile pb-stack-lg">
<div class="flex justify-between items-end mb-stack-md">
<div>
<h2 class="text-title-lg font-title-lg text-on-surface">Suggested Stops</h2>
<p class="text-body-md font-body-md text-on-surface-variant">145 km • 3h 15m total</p>
</div>
</div>
<!-- Vertical Timeline List -->
<div class="flex flex-col gap-0 relative">
<!-- Timeline Line -->
<div class="absolute left-4 top-6 bottom-6 w-0.5 bg-outline-variant"></div>
<!-- Stop 1 -->
<div class="relative pl-12 py-3">
<!-- Timeline Node -->
<div class="absolute left-[11px] top-1/2 -translate-y-1/2 w-[10px] h-[10px] rounded-full bg-surface-container-lowest border-2 border-primary z-10"></div>
<div class="bg-surface border border-outline-variant rounded-lg p-3 shadow-sm hover:border-primary transition-colors cursor-pointer">
<div class="flex justify-between items-start mb-2">
<div>
<h3 class="text-body-lg font-body-lg text-on-surface">Stop 1: Jio-bp Pulse</h3>
<p class="text-caption font-caption text-on-surface-variant">Navi Mumbai • 45 km away</p>
</div>
<span class="bg-[#ECFDF5] text-[#15803D] text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider">
                                    Available
                                </span>
</div>
<div class="flex items-center justify-between">
<span class="inline-flex items-center gap-1 border border-outline-variant rounded-full px-2 py-0.5 text-caption font-caption text-on-surface-variant bg-surface-container-lowest">
<span class="material-symbols-outlined text-[14px]">bolt</span>
                                    CCS2 · 60kW
                                </span>
<span class="text-caption font-caption text-on-surface-variant">ETA: 10:45 AM</span>
</div>
</div>
</div>
<!-- Stop 2 -->
<div class="relative pl-12 py-3 opacity-60">
<div class="absolute left-[11px] top-1/2 -translate-y-1/2 w-[10px] h-[10px] rounded-full bg-outline-variant z-10"></div>
<div class="bg-surface border border-outline-variant rounded-lg p-3 shadow-sm">
<div class="flex justify-between items-start mb-2">
<div>
<h3 class="text-body-lg font-body-lg text-on-surface">Stop 2: Tata Power EZ</h3>
<p class="text-caption font-caption text-on-surface-variant">Lonavala • 92 km away</p>
</div>
<span class="bg-surface-container-high text-on-surface-variant text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider">
                                    Busy
                                </span>
</div>
</div>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-on-secondary-fixed text-on-primary py-3 rounded-lg text-body-lg font-body-lg font-semibold mt-stack-md flex items-center justify-center gap-2 hover:bg-on-secondary-fixed-variant transition-colors shadow-md">
<span class="material-symbols-outlined">navigation</span>
                    Start Navigation
                </button>
</div>
</div>
</main>
</body></html>
