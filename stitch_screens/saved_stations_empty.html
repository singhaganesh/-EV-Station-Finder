<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Saved Stations</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#2d3133",
                        "surface-container": "#eceef0",
                        "on-secondary-fixed": "#111c2d",
                        "on-error-container": "#93000a",
                        "surface-bright": "#f7f9fb",
                        "tertiary-container": "#8d6100",
                        "tertiary-fixed": "#ffdeac",
                        "on-tertiary": "#ffffff",
                        "on-background": "#191c1e",
                        "surface-tint": "#006a63",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#eff1f3",
                        "on-surface": "#191c1e",
                        "tertiary-fixed-dim": "#ffba38",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#bcc7de",
                        "secondary-fixed": "#d8e3fb",
                        "secondary": "#545f73",
                        "outline": "#6e7977",
                        "surface-variant": "#e0e3e5",
                        "on-primary-container": "#a3faef",
                        "primary-container": "#0f766e",
                        "on-primary-fixed-variant": "#00504a",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#281900",
                        "secondary-container": "#d5e0f8",
                        "surface-container-highest": "#e0e3e5",
                        "on-primary-fixed": "#00201d",
                        "on-secondary-container": "#586377",
                        "on-tertiary-container": "#ffe7c6",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#80d5cb",
                        "outline-variant": "#bdc9c6",
                        "surface-container-high": "#e6e8ea",
                        "surface-dim": "#d8dadc",
                        "on-secondary": "#ffffff",
                        "tertiary": "#6d4b00",
                        "inverse-primary": "#80d5cb",
                        "background": "#f7f9fb",
                        "on-tertiary-fixed-variant": "#604100",
                        "surface-container-low": "#f2f4f6",
                        "surface": "#f7f9fb",
                        "on-surface-variant": "#3e4947",
                        "primary-fixed": "#9cf2e8",
                        "on-secondary-fixed-variant": "#3c475a",
                        "primary": "#005c55",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "margin-mobile": "16px",
                        "stack-sm": "4px",
                        "stack-md": "12px",
                        "stack-lg": "24px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "headline-md": ["Plus Jakarta Sans"],
                        "caption": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "headline-sm": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "title-lg": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "caption": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "700" }],
                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "title-lg": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background antialiased min-h-screen flex flex-col font-body-md">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-inverse-surface border-b border-outline-variant dark:border-outline docked full-width top-0 z-40 fixed w-full">
<div class="flex justify-between items-center w-full px-margin-mobile h-16">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="bolt">bolt</span>
<h1 class="text-headline-sm font-headline-sm font-bold text-on-surface dark:text-inverse-on-surface">Station Finder</h1>
</div>
<button class="hover:bg-surface-container dark:hover:bg-inverse-surface p-2 rounded-full transition-transform duration-100 active:scale-95">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<!-- Main Content (Empty State) -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile pt-16 pb-[80px]">
<div class="flex flex-col items-center text-center max-w-sm">
<div class="w-24 h-24 bg-surface-container rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-[48px] text-outline-variant" data-icon="bookmark">bookmark</span>
</div>
<h2 class="text-headline-md font-headline-md text-on-surface mb-2">No favorite stations yet</h2>
<p class="text-body-md font-body-md text-on-surface-variant max-w-[280px]">Tap the bookmark icon on any station to save it here.</p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-surface dark:bg-inverse-surface shadow-[0_-1px_3px_rgba(0,0,0,0.05)]">
<!-- Map Tab -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant px-6 py-1 hover:bg-surface-container-high dark:hover:bg-inverse-surface transition-all duration-200 active:scale-90 rounded-xl" href="#">
<span class="material-symbols-outlined" data-icon="map">map</span>
<span class="text-label-md font-label-md mt-1">Map</span>
</a>
<!-- List Tab -->
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant px-6 py-1 hover:bg-surface-container-high dark:hover:bg-inverse-surface transition-all duration-200 active:scale-90 rounded-xl" href="#">
<span class="material-symbols-outlined" data-icon="list">list</span>
<span class="text-label-md font-label-md mt-1">List</span>
</a>
<!-- Saved Tab (Active) -->
<a class="flex flex-col items-center justify-center bg-primary/10 dark:bg-primary-container/20 text-primary dark:text-primary-fixed-dim rounded-full px-6 py-1 hover:bg-surface-container-high dark:hover:bg-inverse-surface transition-all duration-200 active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="bookmark" data-weight="fill" style="font-variation-settings: 'FILL' 1;">bookmark</span>
<span class="text-label-md font-label-md font-bold mt-1 text-primary dark:text-primary-fixed-dim">Saved</span>
</a>
</nav>
</body></html>
