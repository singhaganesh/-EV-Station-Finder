<body class="bg-background text-on-background min-h-screen pb-[80px] font-body-md antialiased md:hidden"> <!-- App is mobile-first for this view based on instructions -->
<!-- TopAppBar -->
<header class="bg-surface border-b border-outline-variant docked full-width top-0 z-40 fixed">
<div class="flex justify-between items-center w-full px-margin-mobile h-16">
<button aria-label="Leading Icon" class="text-primary hover:bg-surface-container rounded-full p-2 transition-transform duration-100 active:scale-95 flex items-center justify-center h-12 w-12">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">bolt</span>
</button>
<h1 class="text-headline-sm font-headline-sm text-on-surface text-center flex-1 font-bold">Station Finder</h1>
<button aria-label="Trailing Icon" class="text-primary hover:bg-surface-container rounded-full p-2 transition-transform duration-100 active:scale-95 flex items-center justify-center h-12 w-12">
<span class="material-symbols-outlined">account_circle</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-[80px] px-margin-mobile flex flex-col gap-stack-lg">
<!-- Search & Filters Container -->
<section class="flex flex-col gap-stack-md pt-2">
<!-- Search Bar -->
<div class="relative w-full group">
<span class="material-symbols-outlined absolute left-3 top-1/2 transform -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">search</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3 pl-10 pr-4 text-body-md font-body-md text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all shadow-sm" placeholder="Search by station name..." type="text"/>
</div>
<!-- Filter Row -->
<div class="flex items-center justify-between">
<span class="text-body-md font-body-md font-semibold text-on-surface">Filters</span>
<label class="flex items-center cursor-pointer gap-2">
<span class="text-caption font-caption text-on-surface-variant">Only Available</span>
<div class="relative">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-10 h-6 bg-surface-variant rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</div>
</label>
</div>
<!-- Scrollable Connector Chips -->
<div class="flex gap-2 overflow-x-auto hide-scrollbar pb-1">
<button class="flex-shrink-0 bg-primary text-on-primary text-label-md font-label-md px-4 py-2 rounded-full border border-primary transition-colors h-[40px] flex items-center justify-center">
                    All Connectors
                </button>
<button class="flex-shrink-0 bg-surface-container-lowest text-on-surface-variant text-label-md font-label-md px-4 py-2 rounded-full border border-outline-variant hover:bg-surface-container transition-colors h-[40px] flex items-center justify-center">
                    CCS2
                </button>
<button class="flex-shrink-0 bg-surface-container-lowest text-on-surface-variant text-label-md font-label-md px-4 py-2 rounded-full border border-outline-variant hover:bg-surface-container transition-colors h-[40px] flex items-center justify-center">
                    Type 2
                </button>
<button class="flex-shrink-0 bg-surface-container-lowest text-on-surface-variant text-label-md font-label-md px-4 py-2 rounded-full border border-outline-variant hover:bg-surface-container transition-colors h-[40px] flex items-center justify-center">
                    CHAdeMO
                </button>
</div>
</section>
<!-- Station List -->
<section class="flex flex-col gap-stack-md">
<!-- Card 1 -->
<article class="bg-surface-container-lowest rounded-xl p-4 shadow-[0_2px_4px_rgba(30,41,59,0.08)] flex flex-col gap-3">
<div class="flex justify-between items-start">
<div>
<h2 class="text-title-lg font-title-lg text-on-surface">Tata Power - Bandra West</h2>
<p class="text-body-md font-body-md text-on-surface-variant flex items-center gap-1 mt-1">
<span class="material-symbols-outlined text-[16px] text-tertiary-fixed-dim" style="font-variation-settings: 'FILL' 1;">star</span> 4.5 • 0.8 km
                        </p>
</div>
<div class="bg-[#ECFDF5] text-[#15803D] text-caption font-caption px-2 py-1 rounded-full font-semibold border border-[#15803D]/20">
                        Open
                    </div>
</div>
<div class="flex justify-between items-center mt-1 border-t border-surface-variant pt-3">
<div class="flex gap-2">
<span class="bg-surface-container text-on-surface-variant text-caption font-caption px-2 py-1 rounded-md">CCS2</span>
<span class="bg-surface-container text-on-surface-variant text-caption font-caption px-2 py-1 rounded-md">Type 2</span>
</div>
<span class="text-body-md font-body-md font-semibold text-primary">3/4 Available</span>
</div>
</article>
<!-- Card 2 -->
<article class="bg-surface-container-lowest rounded-xl p-4 shadow-[0_2px_4px_rgba(30,41,59,0.08)] flex flex-col gap-3 opacity-75">
<div class="flex justify-between items-start">
<div>
<h2 class="text-title-lg font-title-lg text-on-surface">Ather Grid - Indiranagar</h2>
<p class="text-body-md font-body-md text-on-surface-variant flex items-center gap-1 mt-1">
<span class="material-symbols-outlined text-[16px] text-tertiary-fixed-dim" style="font-variation-settings: 'FILL' 1;">star</span> 4.2 • 2.5 km
                        </p>
</div>
<div class="bg-error-container text-on-error-container text-caption font-caption px-2 py-1 rounded-full font-semibold border border-error-container">

                    </div>
</div>
<div class="flex justify-between items-center mt-1 border-t border-surface-variant pt-3">
<div class="flex gap-2">
<span class="bg-surface-container text-on-surface-variant text-caption font-caption px-2 py-1 rounded-md">Type 2</span>
</div>
<span class="text-body-md font-body-md font-semibold text-error">0/2 Available</span>
</div>
</article>
<!-- Card 3 -->
<article class="bg-surface-container-lowest rounded-xl p-4 shadow-[0_2px_4px_rgba(30,41,59,0.08)] flex flex-col gap-3">
<div class="flex justify-between items-start">
<div>
<h2 class="text-title-lg font-title-lg text-on-surface">Statcon - Gurgaon Sector 44</h2>
<p class="text-body-md font-body-md text-on-surface-variant flex items-center gap-1 mt-1">
<span class="material-symbols-outlined text-[16px] text-tertiary-fixed-dim" style="font-variation-settings: 'FILL' 1;">star</span> 4.7 • 3.1 km
                        </p>
</div>
<div class="bg-[#ECFDF5] text-[#15803D] text-caption font-caption px-2 py-1 rounded-full font-semibold border border-[#15803D]/20">
                        Open
                    </div>
</div>
<div class="flex justify-between items-center mt-1 border-t border-surface-variant pt-3">
<div class="flex gap-2">
<span class="bg-surface-container text-on-surface-variant text-caption font-caption px-2 py-1 rounded-md">CCS2</span>
</div>
<span class="text-body-md font-body-md font-semibold text-primary">1/2 Available</span>
</div>
</article>
</section>

<button class="flex flex-col items-center justify-center text-on-surface-variant px-6 py-1 hover:bg-surface-container-high transition-all duration-200 active:scale-90 rounded-xl min-w-[64px] min-h-[48px]">

</button>
