<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

            background-color: #e5e3df;
            background-image: url('data:image/svg+xml,%3Csvg width="100" height="100" xmlns="http://www.w3.org/2000/svg"%3E%3Cpath d="M10 10h80v80H10z" fill="none" stroke="%23d0d0d0" stroke-width="1"/%3E%3C/svg%3E');
            background-size: 50px 50px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface h-screen flex flex-col overflow-hidden relative">
<!-- TopAppBar -->
<header class="bg-surface border-b border-outline-variant flex justify-between items-center w-full px-margin-mobile h-16 z-10 shrink-0">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-surface-container active:scale-95 transition-transform duration-100 text-primary">
<span class="material-symbols-outlined" data-icon="bolt">bolt</span>
</button>
<h1 class="text-headline-sm font-headline-sm font-bold text-on-surface">Station Finder</h1>
<button class="flex items-center justify-center p-2 rounded-full hover:bg-surface-container active:scale-95 transition-transform duration-100 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</header>
<!-- Filter Bar -->
<div class="bg-surface border-b border-outline-variant py-2 px-margin-mobile z-10 shrink-0">
<div class="flex space-x-2 overflow-x-auto no-scrollbar">
<button class="px-4 py-1.5 rounded-full bg-primary text-on-primary text-label-md font-label-md shrink-0 border border-primary">All</button>
<button class="px-4 py-1.5 rounded-full bg-surface text-on-surface-variant text-label-md font-label-md shrink-0 border border-outline-variant hover:bg-surface-container">CCS2</button>
<button class="px-4 py-1.5 rounded-full bg-surface text-on-surface-variant text-label-md font-label-md shrink-0 border border-outline-variant hover:bg-surface-container">Type 2</button>
<button class="px-4 py-1.5 rounded-full bg-surface text-on-surface-variant text-label-md font-label-md shrink-0 border border-outline-variant hover:bg-surface-container">CHAdeMO</button>
</div>
</div>
<!-- Map Canvas -->
<main class="flex-1 relative map-bg overflow-hidden">
<!-- Loading Bar -->
<div class="absolute top-0 left-0 w-full h-1 bg-surface-container z-20">
<div class="h-full bg-primary w-1/3 rounded-r-full animate-[pulse_2s_ease-in-out_infinite]"></div>
</div>
<!-- Search Area Pill -->
<div class="absolute top-4 left-1/2 -translate-x-1/2 z-20">
<button class="bg-surface shadow-md rounded-full px-4 py-2 flex items-center space-x-2 border border-outline-variant hover:bg-surface-container active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary text-[18px]" data-icon="refresh">refresh</span>
<span class="text-body-md font-body-md text-on-surface">Search this area</span>
</button>
</div>
<!-- Map Markers (Simulated) -->
<div class="absolute top-[30%] left-[40%] transform -translate-x-1/2 -translate-y-1/2">
<div class="w-10 h-10 bg-primary rounded-full border-2 border-surface shadow-sm flex items-center justify-center relative cursor-pointer z-10 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-primary text-[20px]" data-icon="bolt">bolt</span>
<div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-t-[8px] border-t-primary"></div>
</div>
</div>
<div class="absolute top-[60%] left-[70%] transform -translate-x-1/2 -translate-y-1/2">
<div class="w-8 h-8 bg-surface-variant rounded-full border-2 border-surface shadow-sm flex items-center justify-center relative opacity-80">
<span class="material-symbols-outlined text-on-surface-variant text-[16px]" data-icon="bolt">bolt</span>
</div>
</div>
<div class="absolute top-[20%] left-[80%] transform -translate-x-1/2 -translate-y-1/2">
<div class="w-10 h-10 bg-primary rounded-full border-2 border-surface shadow-sm flex items-center justify-center relative cursor-pointer z-10 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-on-primary text-[20px]" data-icon="bolt">bolt</span>
<div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-t-[8px] border-t-primary"></div>
</div>
</div>
<!-- Bottom Floating Card -->
<div class="absolute bottom-20 left-margin-mobile right-margin-mobile z-20">
<div class="bg-surface rounded-[16px] shadow-[0_4px_16px_rgba(30,41,59,0.12)] border border-outline-variant/30 p-4">
<div class="w-10 h-1 bg-surface-variant rounded-full mx-auto mb-3"></div>
<div class="flex justify-between items-start mb-2">
<div>
<h2 class="text-title-lg font-title-lg text-on-surface">Tata Power - BKC, Mumbai</h2>
<p class="text-body-md font-body-md text-on-surface-variant mt-1">1.2 km away</p>
</div>
<div class="bg-[#ECFDF5] px-2 py-1 rounded-full flex items-center border border-[#15803D]/20">
<span class="w-2 h-2 rounded-full bg-[#15803D] mr-1.5"></span>
<span class="text-label-md font-label-md text-[#15803D]">Available</span>
</div>
</div>
<div class="flex space-x-2 mt-4 mb-4">
<div class="bg-surface-container px-2 py-1 rounded text-caption font-caption text-on-surface-variant flex items-center">
<span class="material-symbols-outlined text-[14px] mr-1" data-icon="ev_station">ev_station</span> CCS2
                    </div>
<div class="bg-surface-container px-2 py-1 rounded text-caption font-caption text-on-surface-variant flex items-center">
<span class="material-symbols-outlined text-[14px] mr-1" data-icon="ev_station">ev_station</span> Type 2
                    </div>
</div>
<button class="w-full bg-primary text-on-primary py-3 rounded-lg text-body-md font-body-md font-bold hover:bg-primary/90 transition-colors">
                    View Details
                </button>
</div>
</div>
<!-- FAB -->
<button class="absolute bottom-40 right-margin-mobile w-12 h-12 bg-primary rounded-full shadow-lg flex items-center justify-center text-on-primary hover:bg-primary/90 active:scale-95 transition-transform z-20">
<span class="material-symbols-outlined icon-fill" data-icon="navigation">navigation</span>
</button>
</main>
<!-- BottomNavBar -->
<nav class="bg-surface border-t border-surface-variant/30 shadow-[0_-1px_3px_rgba(0,0,0,0.05)] fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe">
<!-- Active Item: Map -->
<button class="flex flex-col items-center justify-center bg-primary/10 text-primary rounded-full px-6 py-1 hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined icon-fill" data-icon="map">map</span>
<span class="text-label-md font-label-md mt-1">Map</span>
</button>
<!-- Inactive Items -->
<button class="flex flex-col items-center justify-center text-on-surface-variant px-6 py-1 hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined" data-icon="list">list</span>
<span class="text-label-md font-label-md mt-1">List</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-6 py-1 hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined" data-icon="bookmark">bookmark</span>
<span class="text-label-md font-label-md mt-1">Saved</span>
</button>
</nav>
</body></html>
