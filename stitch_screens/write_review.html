<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Write a Review</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                        "surface-tint": "#006a63",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#eff1f3",
                        "on-surface": "#191c1e",

                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#bcc7de",
                        "secondary-fixed": "#d8e3fb",
                        "secondary": "#545f73",
                        "outline": "#6e7977",
                        "surface-variant": "#e0e3e5",
                        "on-primary-container": "#a3faef",
                        "primary-container": "#0f766e",
                        "on-primary-fixed-variant": "#00504a",
                        "on-primary": "#ffffff",

                        "surface-container-highest": "#e0e3e5",

                        "surface-dim": "#d8dadc",

                        "inverse-primary": "#80d5cb",
                        "background": "#f7f9fb",
                        "on-tertiary-fixed-variant": "#604100",
                        "surface-container-low": "#f2f4f6",
                        "surface": "#f7f9fb",
                        "on-surface-variant": "#3e4947",
                        "primary-fixed": "#9cf2e8",
                        "on-secondary-fixed-variant": "#3c475a",

                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",

                    },
                    spacing: {
                        "base": "8px",
                        "margin-mobile": "16px",
                        "stack-sm": "4px",
                        "stack-md": "12px",
                        "stack-lg": "24px",
                        "gutter": "16px"
                    },
                    fontFamily: {
                        "headline-md": ["Plus Jakarta Sans"],
                        "caption": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "headline-sm": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "title-lg": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"]
                    },
                    fontSize: {
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "caption": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],

                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],

<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
<!-- Top App Bar (Task-Focused, No Bottom Nav) -->
<header class="bg-surface text-primary flex justify-between items-center w-full px-margin-mobile h-16 border-b border-outline-variant sticky top-0 z-10">
<button class="p-2 -ml-2 rounded-full hover:bg-surface-container active:scale-95 transition-transform duration-100 flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-headline-sm font-headline-sm font-bold text-on-surface flex-1 text-center pr-10">Write a Review</h1>
</header>
<main class="flex-1 px-margin-mobile py-stack-lg space-y-stack-lg pb-32">
<!-- Target Station Card (Read-Only) -->
<div class="bg-surface-container-lowest rounded-xl p-4 shadow-sm border border-surface-variant flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-primary-container/20 flex items-center justify-center text-primary flex-shrink-0">
<span class="material-symbols-outlined" data-icon="ev_station">ev_station</span>
</div>
<div>
<h2 class="text-title-lg font-title-lg text-on-surface">Tata Power</h2>
<p class="text-body-md font-body-md text-on-surface-variant">Bandra West, Mumbai</p>
</div>
</div>
<!-- Rating Section -->
<section class="space-y-stack-md flex flex-col items-center pt-stack-sm">
<p class="text-body-lg font-body-lg text-on-surface-variant">Your Rating</p>
<div class="flex gap-2">
<button class="text-tertiary-fixed-dim hover:scale-110 transition-transform"><span class="material-symbols-outlined text-[40px]" data-icon="star" data-weight="fill" style="font-variation-settings: 'FILL' 1;">star</span></button>
<button class="text-tertiary-fixed-dim hover:scale-110 transition-transform"><span class="material-symbols-outlined text-[40px]" data-icon="star" data-weight="fill" style="font-variation-settings: 'FILL' 1;">star</span></button>
<button class="text-tertiary-fixed-dim hover:scale-110 transition-transform"><span class="material-symbols-outlined text-[40px]" data-icon="star" data-weight="fill" style="font-variation-settings: 'FILL' 1;">star</span></button>
<button class="text-tertiary-fixed-dim hover:scale-110 transition-transform"><span class="material-symbols-outlined text-[40px]" data-icon="star" data-weight="fill" style="font-variation-settings: 'FILL' 1;">star</span></button>
<button class="text-surface-variant hover:scale-110 transition-transform"><span class="material-symbols-outlined text-[40px]" data-icon="star">star</span></button>
</div>
<p class="text-label-md font-label-md text-primary">Tap to rate</p>
</section>
<!-- Review Text Input -->
<section class="space-y-stack-sm">
<label class="text-body-md font-body-md text-on-surface-variant pl-1" for="review-text">Your Review</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg p-4 text-body-md font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors placeholder:text-outline resize-none shadow-sm" id="review-text" placeholder="Share your experience..." rows="5"></textarea>
</section>
<!-- Photo Upload -->
<section class="space-y-stack-sm">
<label class="text-body-md font-body-md text-on-surface-variant pl-1">Add Photos (Optional)</label>
<button class="w-full h-32 border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center gap-2 bg-surface hover:bg-surface-container-low transition-colors active:scale-[0.98]">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-secondary">
<span class="material-symbols-outlined" data-icon="photo_camera">photo_camera</span>
</div>
<span class="text-label-md font-label-md text-secondary">Tap to upload photos</span>
</button>
</section>
</main>
<!-- Fixed Bottom Action -->
<footer class="fixed bottom-0 left-0 w-full p-margin-mobile bg-surface-container-lowest border-t border-surface-variant shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-20">
<button class="w-full bg-primary text-on-primary h-[48px] rounded-full text-label-md font-label-md flex items-center justify-center active:scale-[0.98] transition-transform shadow-md hover:shadow-lg">
            Submit Review
        </button>
</footer>
</body></html>
