spring.application.name=station-finder-backend

spring.profiles.active=dev

# Server Configuration
server.port=8081
server.address=0.0.0.0

# Database Configuration (PostgreSQL / Supabase)
# References to environment variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.serialization.write-dates-as-timestamps=false

# Response Compression (GZIP)
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/plain
server.compression.min-response-size=1024

# OCM (OpenChargeMap) Configuration
# Reference to environment variable
ocm.api.key=${OCM_API_KEY}
ocm.sync.enabled=true
ocm.sync.radius-km=500
ocm.sync.country-id=101
ocm.sync.interval-cron=0 0 3 * * ?

# Seeding Configuration
app.seeding.enabled=false
